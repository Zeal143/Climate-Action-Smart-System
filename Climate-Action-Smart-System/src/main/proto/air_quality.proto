syntax = "proto3";

option java_package = "com.climate.grpc";
option java_outer_classname = "AirQualityProto";
option java_multiple_files = true;

package airquality;

service AirQualityService {

    // Unary RPC
    rpc GetCurrentAirQuality (AirQualityRequest) returns (AirQualityResponse);

    // Server-side Streaming RPC
    rpc StreamAirQualityReadings (AirQualityRequest) returns (stream AirQualityReading);
}

// Request: identifies the monitoring location
message AirQualityRequest {
    string location = 1;   
}


message AirQualityResponse {
    float  aqi       = 1;   
    float  co2Level  = 2;   
    string status    = 3;   
    string location  = 4;   
    string timestamp = 5;   
}

// individual readings streamed over time
message AirQualityReading {
    float  aqi       = 1;
    float  co2Level  = 2;
    string timestamp = 3;
    string location  = 4;
}
