syntax = "proto3";

option java_package = "com.climate.grpc";
option java_outer_classname = "SolarPanelProto";
option java_multiple_files = true;

package solarpanel;


service SolarPanelService {

    // Unary RPC
    rpc GetPanelStatus (PanelRequest) returns (PanelStatusResponse);

    // Server-side Streaming RPC
    rpc StreamEnergyProduction (PanelRequest) returns (stream EnergyReading);

    // Unary RPC
    rpc AdjustPanelConfiguration (ConfigRequest) returns (ConfigResponse);

    // Client-side Streaming RPC
    // from multiple panels; server returns an aggregated summary
    rpc UploadEnergyBatch (stream EnergyBatchEntry) returns (EnergyBatchSummary);
}

// Identifies a specific solar panel by its ID
message PanelRequest {
    string panelId = 1;   
}

// Full status snapshot of a single solar panel
message PanelStatusResponse {
    string panelId     = 1;
    float  powerOutput = 2;  
    float  efficiency  = 3;  
    string status      = 4;   
    float  temperature = 5;   
    string lastUpdated = 6;   
}

// A single live energy production reading (used in server streaming)
message EnergyReading {
    float  energyKwh     = 1;   
    float  sunlightLevel = 2;   
    string timestamp     = 3;
    string panelId       = 4;
}

// Request to change the tilt angle of a solar panel
message ConfigRequest {
    string panelId  = 1;
    float  newAngle = 2;   
}

// Result of an angle adjustment operation
message ConfigResponse {
    bool   success      = 1;   
    string message      = 2;   
    float  appliedAngle = 3;   
}

// A single historical entry used in the batch upload stream
message EnergyBatchEntry {
    string panelId   = 1;
    float  energyKwh = 2;
    string timestamp = 3;
}

// Aggregated summary returned after all batch entries have been received
message EnergyBatchSummary {
    int32  recordsReceived  = 1;
    float  totalEnergyKwh   = 2;
    float  averageEnergyKwh = 3;
    float  peakEnergyKwh    = 4;
    string message          = 5;
}
